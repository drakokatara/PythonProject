<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS Attendance | Quick Log</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pcs-red: #e30613;
            --pcs-dark: #2d2d2d;
            --pcs-white: #ffffff;
            --pcs-light-gray: #f8f9fa;
        }

        body {
            background-color: #f1f1f1;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 40px 0;
        }

        .dashboard-container { max-width: 480px; margin: 0 auto; position: relative; }

        /* Floating Back Button */
        .floating-back {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: var(--pcs-dark);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: 0.3s;
            text-decoration: none;
        }
        .floating-back:hover { background: var(--pcs-red); color: white; transform: scale(1.1); }

        .card {
            border: none;
            border-radius: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 4px solid var(--pcs-red);
        }

        .card-title {
            color: var(--pcs-red);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .work-type-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .work-option {
            border: 1px solid #ddd;
            border-radius: 2px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--pcs-white);
            color: var(--pcs-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .work-option i { font-size: 1.4rem; margin-bottom: 5px; }

        .work-option.active {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border-color: transparent;
        }

        .work-option.active#opt-office { background-color: var(--pcs-red); }
        .work-option.active#opt-remote { background-color: #0ea5e9; }
        .work-option.active#opt-leave  { background-color: #10b981; }
        .work-option.active#opt-sick   { background-color: #f59e0b; }

        #id_work_type { display: none; }

        .form-label { font-weight: 700; font-size: 0.75rem; color: var(--pcs-dark); margin-bottom: 8px; display: block; }

        .form-control, select {
            border-radius: 0 !important;
            padding: 12px;
            border: 1px solid #ddd;
            background-color: var(--pcs-light-gray);
        }

        .form-control:focus, select:focus {
            border-color: var(--pcs-red);
            box-shadow: none;
            background-color: white;
        }

        .btn-submit {
            background: var(--pcs-dark);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 0;
            font-weight: 700;
            width: 100%;
            margin-top: 25px;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-submit:hover:not(:disabled) { background: var(--pcs-red); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

        .alert-warning {
            border-radius: 0;
            border: none;
            border-left: 4px solid #ffc107;
            font-weight: 600;
            font-size: 0.85rem;
            background-color: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>

<a href="{% url 'manage_employees' %}" class="floating-back">
    <i class="fas fa-arrow-left"></i>
</a>

<div class="container dashboard-container">
    <div class="text-center mb-4">
        <h2 style="font-weight: 800; color: var(--pcs-red);">PCS <span style="color: var(--pcs-dark); font-weight: 300;">Log</span></h2>
    </div>

    <div class="card shadow-lg">
        <div class="card-body p-4 p-md-5">
            <h5 class="card-title text-center mb-4">Καταχώρηση Ημέρας</h5>

            <form method="post" id="attendance-form">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label">ΣΥΝΕΡΓΑΤΗΣ</label>
                    {{ form.employee }}
                </div>

                <div class="mb-4">
                    <label class="form-label">ΗΜΕΡΟΜΗΝΙΑ</label>
                    {{ form.date }}
                    <div id="date-warning" class="alert alert-warning mt-2 py-2" style="display:none;"></div>
                </div>

                <div class="mb-2">
                    <label class="form-label">ΚΑΤΑΣΤΑΣΗ / ΤΟΠΟΘΕΣΙΑ</label>
                    {{ form.work_type }}

                    <div class="work-type-group">
                        <div class="work-option" id="opt-office" onclick="selectWork('OFFICE')">
                            <i class="fas fa-building"></i>
                            <span class="small fw-bold">ΓΡΑΦΕΙΟ</span>
                        </div>
                        <div class="work-option" id="opt-remote" onclick="selectWork('REMOTE')">
                            <i class="fas fa-laptop-house"></i>
                            <span class="small fw-bold">ΤΗΛΕΡΓΑΣΙΑ</span>
                        </div>
                        <div class="work-option" id="opt-leave" onclick="selectWork('LEAVE')">
                            <i class="fas fa-plane"></i>
                            <span class="small fw-bold">ΑΔΕΙΑ</span>
                        </div>
                        <div class="work-option" id="opt-sick" onclick="selectWork('SICK')">
                            <i class="fas fa-medkit"></i>
                            <span class="small fw-bold">ΑΣΘΕΝΕΙΑ</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit" id="submit-btn">
                    Ολοκληρωση & Αποθηκευση
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const greekHolidays = {{ holidays_js|safe }};
    const realSelect = document.getElementById('id_work_type');
    const dateInput = document.querySelector('input[type="date"]');
    const submitBtn = document.getElementById('submit-btn');
    const warning = document.getElementById('date-warning');

    // Κεντρική συνάρτηση ελέγχου εγκυρότητας
    function validateEntry() {
        const selectedDate = dateInput.value;
        const workType = realSelect.value;

        if (!selectedDate) return;

        const d = new Date(selectedDate);
        const day = d.getDay(); // 0 = Κυριακή, 6 = Σάββατο

        const isWeekend = (day === 0 || day === 6);
        const isHoliday = greekHolidays.includes(selectedDate);

        // Ο έλεγχος (Warning) εμφανίζεται ΜΟΝΟ αν ο τύπος εργασίας είναι OFFICE ή REMOTE
        // Αν είναι LEAVE ή SICK, επιτρέπουμε την καταχώρηση κανονικά
        if ((workType === 'OFFICE' || workType === 'REMOTE') && (isWeekend || isHoliday)) {
            warning.style.display = 'block';
            if (isHoliday) {
                warning.innerHTML = '<i class="fas fa-umbrella-beach me-2"></i>Επίσημη Αργία: Δεν επιτρέπεται καταχώρηση για εργασία.';
            } else {
                warning.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Σαββατοκύριακο: Δεν επιτρέπεται καταχώρηση για εργασία.';
            }
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
        } else {
            // Σε κάθε άλλη περίπτωση (π.χ. ΑΔΕΙΑ ή καθημερινή), όλα ΟΚ
            warning.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
        }
    }

    // Επιλογή τύπου εργασίας
    function selectWork(val) {
        realSelect.value = val;
        document.querySelectorAll('.work-option').forEach(opt => opt.classList.remove('active'));
        const activeOpt = document.getElementById(`opt-${val.toLowerCase()}`);
        if (activeOpt) activeOpt.classList.add('active');

        // Κάθε φορά που αλλάζει το κουμπί, ξαναελέγχουμε την εγκυρότητα
        validateEntry();
    }

    // Όταν αλλάζει η ημερομηνία
    if (dateInput) {
        dateInput.addEventListener('change', validateEntry);
    }

    // SweetAlert2 για μηνύματα από Django
    {% if messages %}
        {% for message in messages %}
            Swal.fire({
                icon: '{% if message.tags == "success" %}success{% elif message.tags == "error" %}error{% else %}info{% endif %}',
                title: '{% if message.tags == "success" %}Επιτυχία!{% else %}Προσοχή!{% endif %}',
                text: '{{ message }}',
                confirmButtonColor: '#e30613',
                timer: 3000,
                timerProgressBar: true
            });
        {% endfor %}
    {% endif %}

    window.onload = function() {
        // Smart Default: Σημερινή ημερομηνία
        const today = new Date().toISOString().split('T')[0];
        if (!dateInput.value) {
            dateInput.value = today;
        }

        // Default επιλογή OFFICE
        selectWork('OFFICE');

        document.querySelectorAll('select').forEach(s => s.classList.add('form-select'));
    };
</script>
</body>
</html>
