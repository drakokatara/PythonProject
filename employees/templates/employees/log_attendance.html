<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --red: #CC2200; --red-s: #FFF0ED; --dark: #111; --muted: #999; --border: #E8E8E8; --bg: #F5F4F1; --surface: #FFF; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .back-btn { position: fixed; top: 20px; left: 20px; width: 38px; height: 38px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: #555; text-decoration: none; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .back-btn:hover { background: var(--dark); color: #fff; transform: scale(1.1); }
        .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 25px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); }
        .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; letter-spacing: 0.5px; }
        .field-group select, .field-group input { width: 100%; height: 40px; border: 1px solid var(--border); border-radius: 8px; background: #FAFAFA; padding: 0 12px; margin-bottom: 15px; }
        .work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .work-opt { border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; transition: 0.15s; background: #FAFAFA; }
        .work-opt:hover { border-color: #CCC; background: #fff; }
        .work-opt-icon { font-size: 18px; }
        .work-opt-label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--muted); }
        /* Active States */
        .active-OFFICE { background: var(--red-s); border-color: var(--red); }
        .active-REMOTE { background: #EFF6FF; border-color: #0284C7; }
        .active-LEAVE { background: #F0FDF4; border-color: #16A34A; }
        .active-SICK { background: #FFFBEB; border-color: #D97706; }
        .warn-box { display: none; padding: 10px; background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px; font-size: 12px; color: #D97706; margin-bottom: 15px; }
        .btn-submit { width: 100%; height: 45px; border: none; border-radius: 10px; background: var(--dark); color: #fff; font-weight: 500; transition: 0.2s; }
        .btn-submit:hover:not(:disabled) { background: var(--red); }
        .btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
        #id_work_type { display: none !important; }
    </style>
</head>
<body>

<a href="{% url 'manage_employees' %}" class="back-btn"><i class="fas fa-arrow-left"></i></a>
<div class="form-card">
    <div class="fw-bold mb-3 text-center">Καταχώρηση ημέρας</div>
    <form method="post" id="att-form">
        {% csrf_token %}
        <div class="field-group"><label class="field-label">Συνεργάτης</label>{{ form.employee }}</div>
        <div class="field-group"><label class="field-label">Ημερομηνία</label>{{ form.date }}</div>
        <label class="field-label">Κατάσταση</label>
        {{ form.work_type }}
        <div class="work-grid">
            <div class="work-opt" id="opt-OFFICE" onclick="sel('OFFICE')"><div class="work-opt-icon">🏢</div><div class="work-opt-label">Γραφείο</div></div>
            <div class="work-opt" id="opt-REMOTE" onclick="sel('REMOTE')"><div class="work-opt-icon">💻</div><div class="work-opt-label">Τηλεργασία</div></div>
            <div class="work-opt" id="opt-LEAVE" onclick="sel('LEAVE')"><div class="work-opt-icon">✈️</div><div class="work-opt-label">Άδεια</div></div>
            <div class="work-opt" id="opt-SICK" onclick="sel('SICK')"><div class="work-opt-icon">🩺</div><div class="work-opt-label">Ασθένεια</div></div>
        </div>
        <div class="warn-box" id="warn"></div>
        <button type="submit" class="btn-submit" id="sub-btn">Αποθήκευση</button>
    </form>
</div>

<script>
    const holidays = {{ holidays_js|safe }},
          f = document.getElementById('id_work_type'),
          dIn = document.querySelector('input[type="date"]'),
          btn = document.getElementById('sub-btn'),
          wrn = document.getElementById('warn');

    function val() {
        const d = new Date(dIn.value), day = d.getDay(),
              isRestricted = (day === 0 || day === 6 || holidays.includes(dIn.value)),
              isWork = (f.value === 'OFFICE' || f.value === 'REMOTE');

        if (isWork && isRestricted) {
            wrn.style.display = 'block';
            wrn.innerText = day === 0 || day === 6 ? 'Σαββατοκύριακο - Μη επιτρεπτή εργασία' : 'Αργία - Μη επιτρεπτή εργασία';
            btn.disabled = true;
        } else {
            wrn.style.display = 'none';
            btn.disabled = false;
        }
    }

    function sel(v) {
        f.value = v;
        document.querySelectorAll('.work-opt').forEach(el => {
            el.classList.remove('active-OFFICE', 'active-REMOTE', 'active-LEAVE', 'active-SICK');
            if(el.id === `opt-${v}`) el.classList.add(`active-${v}`);
        });
        val();
    }

    dIn.onchange = val;
    window.onload = () => { if(!dIn.value) dIn.value = new Date().toISOString().split('T')[0]; sel('OFFICE'); };

    {% if messages %}{% for m in messages %}
    Swal.fire({ icon: '{{ m.tags }}' === 'error' ? 'error' : 'success', text: '{{ m }}', timer: 2000, showConfirmButton: false });
    {% endfor %}{% endif %}
</script>
</body>
</html>
