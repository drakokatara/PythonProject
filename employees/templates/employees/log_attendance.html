<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS Attendance | Quick Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pcs-red: #e30613;
            --pcs-dark: #2d2d2d;
            --pcs-white: #ffffff;
            --pcs-light-gray: #f8f9fa;
        }

        body {
            background-color: #f1f1f1;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 40px 0;
        }

        .dashboard-container { max-width: 480px; margin: 0 auto; }

        .card {
            border: none;
            border-radius: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 4px solid var(--pcs-red);
        }

        .card-title {
            color: var(--pcs-red);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* PCS Style Work Options */
        .work-type-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .work-option {
            border: 1px solid #ddd;
            border-radius: 2px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--pcs-white);
            color: var(--pcs-dark);
        }

        .work-option i { font-size: 1.4rem; display: block; margin-bottom: 5px; }

        .work-option.active {
            border-color: var(--pcs-red);
            background-color: var(--pcs-red);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(227, 6, 19, 0.2);
        }

        /* Hide Default Django Select */
        #id_work_type { display: none; }

        .form-label { font-weight: 700; font-size: 0.75rem; color: var(--pcs-dark); margin-bottom: 8px; display: block; }

        .form-control, select {
            border-radius: 0 !important;
            padding: 12px;
            border: 1px solid #ddd;
            background-color: var(--pcs-light-gray);
        }

        .form-control:focus {
            border-color: var(--pcs-red);
            box-shadow: none;
            background-color: white;
        }

        .btn-submit {
            background: var(--pcs-dark);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 0;
            font-weight: 700;
            width: 100%;
            margin-top: 25px;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--pcs-red);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .alert-warning {
            border-radius: 0;
            border: none;
            border-left: 4px solid #ffc107;
            font-weight: 600;
            font-size: 0.85rem;
            background-color: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>

<div class="container dashboard-container">
    <div class="text-center mb-4">
        <h2 style="font-weight: 800; color: var(--pcs-red);">PCS <span style="color: var(--pcs-dark); font-weight: 300;">Log</span></h2>
    </div>

    <div class="card shadow-lg">
        <div class="card-body p-4 p-md-5">
            <h5 class="card-title text-center mb-4">Καταχώρηση Ημέρας</h5>

            <form method="post" id="attendance-form">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label">ΣΥΝΕΡΓΑΤΗΣ</label>
                    {{ form.employee }}
                </div>

                <div class="mb-4">
                    <label class="form-label">ΗΜΕΡΟΜΗΝΙΑ</label>
                    {{ form.date }}
                    <div id="date-warning" class="alert alert-warning mt-2 py-2" style="display:none;">
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label">ΤΟΠΟΘΕΣΙΑ ΕΡΓΑΣΙΑΣ</label>
                    {{ form.work_type }}

                    <div class="work-type-group">
                        <div class="work-option" id="opt-office" onclick="selectWork('OFFICE')">
                            <i class="fas fa-building"></i>
                            <span class="small fw-bold">ΓΡΑΦΕΙΟ</span>
                        </div>
                        <div class="work-option" id="opt-remote" onclick="selectWork('REMOTE')">
                            <i class="fas fa-laptop-house"></i>
                            <span class="small fw-bold">ΤΗΛΕΡΓΑΣΙΑ</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit" id="submit-btn">
                    Ολοκληρωση & Αποθηκευση
                </button>
            </form>

            <div class="text-center mt-4 border-top pt-3">
                <a href="{% url 'manage_employees' %}" class="text-muted text-decoration-none small fw-bold">
                    <i class="fas fa-arrow-left me-1"></i> ΕΠΙΣΤΡΟΦΗ ΣΤΟ DASHBOARD
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // Λήψη λίστας αργιών από το Django Template Context
    const greekHolidays = {{ holidays_js|safe }};

    const realSelect = document.getElementById('id_work_type');
    const optOffice = document.getElementById('opt-office');
    const optRemote = document.getElementById('opt-remote');
    const dateInput = document.querySelector('input[type="date"]');
    const submitBtn = document.getElementById('submit-btn');
    const warning = document.getElementById('date-warning');

    // Λειτουργία για την εναλλαγή των κουμπιών εργασίας
    function selectWork(val) {
        realSelect.value = val;
        if (val === 'OFFICE') {
            optOffice.classList.add('active');
            optRemote.classList.remove('active');
        } else {
            optRemote.classList.add('active');
            optOffice.classList.remove('active');
        }
    }

    // Έλεγχος Ημερομηνίας: Αποκλεισμός Σαββατοκύριακων και Αργιών
    dateInput.addEventListener('change', function() {
        const selectedDate = this.value; // Format: YYYY-MM-DD
        if (!selectedDate) return;

        // Διόρθωση για timezone offset κατά τη δημιουργία Date αντικειμένου
        const d = new Date(selectedDate);
        const day = d.getDay(); // 0=Κυριακή, 6=Σάββατο

        const isWeekend = (day === 0 || day === 6);
        const isHoliday = greekHolidays.includes(selectedDate);

        if (isWeekend || isHoliday) {
            warning.style.display = 'block';
            if (isHoliday) {
                warning.innerHTML = '<i class="fas fa-umbrella-beach me-2"></i>Επίσημη Αργία PCS: Μη εργάσιμη ημέρα';
            } else {
                warning.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Σαββατοκύριακο: Μη εργάσιμη ημέρα';
            }
            submitBtn.disabled = true;
        } else {
            warning.style.display = 'none';
            submitBtn.disabled = false;
        }
    });

    // Αρχικοποίηση στην επιλογή "Γραφείο"
    window.onload = function() {
        selectWork('OFFICE');

        // Προσθήκη CSS κλάσεων Bootstrap στα Django forms αν λείπουν
        const selects = document.querySelectorAll('select');
        selects.forEach(s => s.classList.add('form-select'));
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
