<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Log | Attendance Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --bg-color: #f8fafc;
        }

        body { background-color: var(--bg-color); font-family: 'Inter', sans-serif; padding: 20px 0; }
        .dashboard-container { max-width: 500px; margin: 0 auto; }

        .card { border: none; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        /* Modern Toggle Buttons for Work Type */
        .work-type-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .work-option {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .work-option i { font-size: 1.5rem; display: block; margin-bottom: 8px; }

        /* Όταν επιλέγεται το κουμπί */
        .work-option.active {
            border-color: var(--accent-color);
            background-color: #eff6ff;
            color: var(--accent-color);
            transform: scale(1.05);
        }

        /* Κρύβουμε το κλασικό Select του Django */
        #id_work_type { display: none; }

        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #f1f5f9; }
        .form-control:focus { border-color: var(--accent-color); box-shadow: none; }

        .btn-submit {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container dashboard-container">
    <div class="card">
        <div class="card-body p-4 p-md-5">
            <h4 class="fw-bold mb-4 text-center"><i class="fas fa-bolt text-warning me-2"></i>Γρήγορη Καταχώρηση</h4>

            <form method="post" id="attendance-form">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="small fw-bold text-muted mb-2">ΠΟΙΟΣ;</label>
                    {{ form.employee }}
                </div>

                <div class="mb-4">
                    <label class="small fw-bold text-muted mb-2">ΠΟΤΕ;</label>
                    {{ form.date }}
                    <div id="weekend-warning" class="alert alert-warning mt-2 py-2 small" style="display:none;">
                        <i class="fas fa-exclamation-triangle"></i> Σαββατοκύριακο!
                    </div>
                </div>

                <div class="mb-2">
                    <label class="small fw-bold text-muted mb-2">ΠΟΥ;</label>
                    {{ form.work_type }}

                    <div class="work-type-group">
                        <div class="work-option" id="opt-office" onclick="selectWork('OFFICE')">
                            <i class="fas fa-building"></i>
                            <span class="small fw-bold">Γραφείο</span>
                        </div>
                        <div class="work-option" id="opt-remote" onclick="selectWork('REMOTE')">
                            <i class="fas fa-laptop-house"></i>
                            <span class="small fw-bold">Τηλεργασία</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit" id="submit-btn">
                    Αποθήκευση (Enter)
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'manage_employees' %}" class="text-muted text-decoration-none small">
                    <i class="fas fa-chevron-left me-1"></i> Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    const realSelect = document.getElementById('id_work_type');
    const optOffice = document.getElementById('opt-office');
    const optRemote = document.getElementById('opt-remote');

    // Λειτουργία Quick Select
    function selectWork(val) {
        realSelect.value = val;

        // Αλλάζουμε την εμφάνιση των κουμπιών
        if (val === 'OFFICE') {
            optOffice.classList.add('active');
            optRemote.classList.remove('active');
        } else {
            optRemote.classList.add('active');
            optOffice.classList.remove('active');
        }
    }

    // Έλεγχος Σαββατοκύριακου (Όπως πριν αλλά πιο γρήγορος)
    const dateInput = document.querySelector('input[type="date"]');
    const submitBtn = document.getElementById('submit-btn');
    const warning = document.getElementById('weekend-warning');

    dateInput.addEventListener('change', function() {
        const d = new Date(this.value);
        const day = d.getDay();
        if (day === 0 || day === 6) {
            warning.style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
        } else {
            warning.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
        }
    });

    // Default επιλογή
    selectWork('OFFICE');
</script>

</body>
</html>
