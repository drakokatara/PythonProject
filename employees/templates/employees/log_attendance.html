<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS Attendance | Καταχώρηση</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --pcs-navy:     #450A0A; /* Βαθύ Μπορντό */
            --pcs-red:      #991B1B; /* Κόκκινο Crimson */
            --pcs-red-l:    #DC2626; /* Φωτεινό Κόκκινο */
            --pcs-off:      #FEF2F2; /* Απαλό Ροζ Φόντο */
            --pcs-border:   #FEE2E2;
            --pcs-text:     #1F2937;
            --pcs-muted:    #7F1D1D;
            --pcs-surface:  #FFFFFF;
            --pcs-radius:   16px;
        }

        * { box-sizing: border-box; }
        body {
            background: var(--pcs-off); font-family: 'Inter', sans-serif; font-size: 14px;
            min-height: 100vh; margin: 0; color: var(--pcs-text);
            display: flex; flex-direction: column;
        }

        /* ── Topbar ── */
        .topbar {
            background: var(--pcs-navy); height: 64px; padding: 0 32px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15); flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .topbar-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .topbar-brand { font-size: 24px; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px; line-height: 1; font-family: 'Sora', sans-serif; }
        .topbar-brand span { color: var(--pcs-red-l); }

        .topbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.2); }
        .topbar-label { color: rgba(255,255,255,0.65); font-size: 12px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

        .back-link-top {
            color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px;
            font-weight: 500; display: flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .back-link-top:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: #fff; }

        /* ── Main content ── */
        .main-content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }

        /* ── Card ── */
        .log-card {
            background: var(--pcs-surface); width: 100%; max-width: 480px;
            border-radius: var(--pcs-radius); border: 1px solid var(--pcs-border);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .log-card-header {
            background: var(--pcs-navy); padding: 32px 32px 28px;
            text-align: center;
        }
        .log-card-header .icon-wrap {
            width: 56px; height: 56px; border-radius: 14px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 16px;
        }
        .log-card-header h4 {
            font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700;
            color: #fff; margin: 0 0 6px;
        }
        .log-card-header p { color: rgba(255,255,255,0.5); font-size: 13px; margin: 0; }
        .log-card-body { padding: 32px; }

        /* ── Field labels ── */
        .field-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--pcs-muted); margin-bottom: 8px; display: block;
        }

        /* ── Inputs ── */
        select, input[type="date"] {
            width: 100%; height: 44px; border: 1px solid var(--pcs-border); border-radius: 9px;
            background: #FFF5F5; padding: 0 12px; margin-bottom: 24px;
            font-size: 14px; color: var(--pcs-text); transition: 0.2s; font-family: 'Inter', sans-serif;
        }
        select:focus, input[type="date"]:focus {
            outline: none; border-color: var(--pcs-red); background: #fff;
            box-shadow: 0 0 0 3px rgba(153,27,27,0.1);
        }

        /* ── Work type grid ── */
        .work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .work-opt {
            border: 2px solid var(--pcs-border); border-radius: 12px; padding: 18px 10px;
            text-align: center; cursor: pointer; transition: 0.2s; background: #FFF5F5;
            user-select: none;
        }
        .work-opt:hover { border-color: var(--pcs-red-l); background: #fff; }
        .work-opt-icon { font-size: 26px; margin-bottom: 8px; display: block; }
        .work-opt-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--pcs-muted); }

        /* Active States */
        .active-OFFICE, .active-REMOTE, .active-LEAVE, .active-SICK {
            background: #fff!important;
            border-color: var(--pcs-red)!important;
            box-shadow: 0 4px 12px rgba(153,27,27,0.1);
        }
        .active-OFFICE .work-opt-label, .active-REMOTE .work-opt-label,
        .active-LEAVE .work-opt-label, .active-SICK .work-opt-label { color: var(--pcs-red)!important; }

        /* ── Warn ── */
        .warn-box {
            display: none; padding: 12px 16px; background: #FEF2F2;
            border: 1px solid #FECACA; border-radius: 10px;
            font-size: 13px; color: #B91C1C; margin-bottom: 24px;
            align-items: center; gap: 10px;
        }

        /* ── Submit ── */
        .btn-submit {
            width: 100%; height: 50px; border: none; border-radius: 10px;
            background: var(--pcs-navy); color: #fff; font-weight: 700; font-size: 15px;
            transition: 0.2s; cursor: pointer; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-submit:hover:not(:disabled) { background: #000; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-submit:disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; }

        #id_work_type { display: none !important; }
    </style>
</head>
<body>

<nav class="topbar">
    <div class="topbar-logo">
        <div class="topbar-brand"><span>P</span>CS</div>
        <div class="topbar-divider"></div>
        <span class="topbar-label">Attendance</span>
    </div>
    <a href="{% url 'manage_employees' %}" class="back-link-top">
        <i class="fas fa-arrow-left"></i> Επιστροφή
    </a>
</nav>

<div class="main-content">
    <div class="log-card">
        <div class="log-card-header">
            <div class="icon-wrap">📅</div>
            <h4>Καταχώρηση Ημέρας</h4>
            <p>Επιλέξτε συνεργάτη και τύπο παρουσίας</p>
        </div>

        <div class="log-card-body">
            <form method="post" id="log-form">
                {% csrf_token %}

                <label class="field-label">Συνεργάτης</label>
                {{ form.employee }}

                <label class="field-label">Ημερομηνία</label>
                {{ form.date }}

                <label class="field-label">Τύπος Εργασίας</label>
                {{ form.work_type }}

                <div class="work-grid">
                    <div class="work-opt" id="opt-OFFICE" onclick="sel('OFFICE')">
                        <span class="work-opt-icon">🏢</span>
                        <div class="work-opt-label">Γραφείο</div>
                    </div>
                    <div class="work-opt" id="opt-REMOTE" onclick="sel('REMOTE')">
                        <span class="work-opt-icon">💻</span>
                        <div class="work-opt-label">Τηλεργασία</div>
                    </div>
                    <div class="work-opt" id="opt-LEAVE" onclick="sel('LEAVE')">
                        <span class="work-opt-icon">✈️</span>
                        <div class="work-opt-label">Άδεια</div>
                    </div>
                    <div class="work-opt" id="opt-SICK" onclick="sel('SICK')">
                        <span class="work-opt-icon">🩺</span>
                        <div class="work-opt-label">Ασθένεια</div>
                    </div>
                </div>

                <div class="warn-box" id="warn">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="warn-text"></span>
                </div>

                <button type="submit" class="btn-submit" id="sub-btn">
                    <i class="fas fa-check-circle"></i> Υποβολή Καταχώρησης
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const logHols   = {{ holidays_js|safe }};
    const wtSelect  = document.getElementById('id_work_type');
    const dateInput = document.querySelector('input[type="date"]');
    const btnSubmit = document.getElementById('sub-btn');
    const warnBox   = document.getElementById('warn');
    const warnText  = document.getElementById('warn-text');

    function validate() {
        if (!dateInput.value) return;
        const d = new Date(dateInput.value), day = d.getDay();
        const isWeekend = (day === 0 || day === 6);
        const isHoliday = logHols.includes(dateInput.value);
        const isWork    = (wtSelect.value === 'OFFICE' || wtSelect.value === 'REMOTE');

        if (isWork && (isWeekend || isHoliday)) {
            warnBox.style.display = 'flex';
            warnText.innerText = isWeekend ? 'Δεν επιτρέπεται εργασία το Σαββατοκύριακο.' : 'Η ημέρα αυτή είναι αργία.';
            btnSubmit.disabled = true;
        } else {
            warnBox.style.display = 'none';
            btnSubmit.disabled = false;
        }
    }

    function sel(val) {
        wtSelect.value = val;
        document.querySelectorAll('.work-opt').forEach(el =>
            el.classList.remove('active-OFFICE', 'active-REMOTE', 'active-LEAVE', 'active-SICK')
        );
        document.getElementById(`opt-${val}`).classList.add(`active-${val}`);
        validate();
    }

    dateInput.addEventListener('change', validate);

    window.addEventListener('load', () => {
        if (!dateInput.value) dateInput.value = new Date().toISOString().split('T')[0];
        sel('OFFICE');
    });

    {% if messages %}{% for m in messages %}
    Swal.fire({
        icon: '{{ m.tags }}' === 'error' ? 'error' : 'success',
        text: '{{ m }}', timer: 3000, showConfirmButton: false,
        toast: true, position: 'top-end'
    });
    {% endfor %}{% endif %}
</script>
</body>
</html>
